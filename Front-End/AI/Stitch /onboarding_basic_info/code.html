<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-20 bg-[#faf9f7] border-b-2 border-dashed border-[#dad4c8] shadow-[-4px_4px_0px_0px_rgba(46,47,46,1)]">

<span class="text-2xl font-black text-[#2e2f2e] tracking-[-1.5px] font-['Plus_Jakarta_Sans']">UM6P_FIT</span>
</div>
<!-- Progress Dots Indicator -->
<div class="flex gap-3 items-center">
<div class="w-10 h-3 rounded-full bg-[#38671a] kinetic-shadow-sm"></div>
<div class="w-3 h-3 rounded-full bg-[#dad4c8]"></div>

</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-2xl mt-32 mb-32 flex flex-col gap-12">
<!-- Header Section -->
<div class="relative">
<h1 class="text-6xl md:text-7xl font-extrabold text-[#2e2f2e] aggressive-crop max-w-md">
                Tell us about yourself
            </h1>
<!-- Activity Sticker -->
<div class="absolute -right-4 -top-8 rotate-12 bg-[#b4a5ff] text-[#180058] px-4 py-2 rounded-full kinetic-shadow-sm technical-label text-[10px] font-bold">
                Level 01: Basics
            </div>
</div>
<!-- Form Bento Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<!-- Gender Selection (Full Width in grid) -->
<div class="md:col-span-2 space-y-4">
<label class="technical-label text-xs font-bold text-[#5f5b52] ml-2">Identity</label>
<div class="flex p-2 bg-[#f1f1ef] rounded-full border-2 border-[#dad4c8] items-center gap-2">
<button class="flex-1 py-4 px-6 rounded-full bg-[#38671a] text-[#faf9f7] font-bold kinetic-shadow-sm transition-all hover:rotate-1">
                        Male
                    </button>
<button class="flex-1 py-4 px-6 rounded-full text-[#2e2f2e] font-bold hover:bg-[#dad4c8]/30 transition-all">
                        Female
                    </button>
</div>
</div>
<!-- Age Input -->
<div class="space-y-4">
<label class="technical-label text-xs font-bold text-[#5f5b52] ml-2">Years on Earth</label>
<div class="group relative">
<input class="w-full py-6 px-8 bg-white border-2 border-[#dad4c8] rounded-xl text-2xl font-bold focus:ring-0 focus:border-[#38671a] transition-all outline-none" placeholder="25" type="number"/>
<span class="absolute right-8 top-1/2 -translate-y-1/2 technical-label text-xs text-[#5f5b52]">Age</span>
</div>
</div>
<!-- Height Input -->
<div class="space-y-4">
<label class="technical-label text-xs font-bold text-[#5f5b52] ml-2">Vertical Reach</label>
<div class="group relative">
<input class="w-full py-6 px-8 bg-white border-2 border-[#dad4c8] rounded-xl text-2xl font-bold focus:ring-0 focus:border-[#38671a] transition-all outline-none" placeholder="175" type="number"/>
<span class="absolute right-8 top-1/2 -translate-y-1/2 technical-label text-xs text-[#5f5b52]">cm</span>
</div>
</div>
<!-- Weight Input (Full width on mobile, spans 1 on desktop) -->
<div class="md:col-span-2 space-y-4">
<label class="technical-label text-xs font-bold text-[#5f5b52] ml-2">Current Mass</label>
<div class="group relative">
<input class="w-full py-6 px-8 bg-white border-2 border-[#dad4c8] rounded-xl text-2xl font-bold focus:ring-0 focus:border-[#38671a] transition-all outline-none" placeholder="70" type="number"/>
<span class="absolute right-8 top-1/2 -translate-y-1/2 technical-label text-xs text-[#5f5b52]">kg</span>
</div>
</div>
</div>

<div class="bg-[#e8e2d6] p-8 rounded-xl border-2 border-dashed border-[#dad4c8] flex items-start gap-6">
<span class="material-symbols-outlined text-[#38671a] text-3xl">info</span>
<p class="text-sm leading-relaxed font-medium text-[#5f5b52]">
