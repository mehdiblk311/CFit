<div class="flex flex-col">

<span class="font-roobert font-bold text-lg">170 kcal</span>

<div class="flex gap-6">

<span class="font-bold">6g</span>
</div>
<div class="text-right">
<span class="block font-space-mono text-[10px] text-on-surface-variant uppercase">C</span>
<span class="font-bold">28g</span>
</div>
<div class="text-right">
<span class="block font-space-mono text-[10px] text-on-surface-variant uppercase">F</span>

<div class="flex items-baseline justify-center gap-2">
<input class="w-48 text-center font-roobert font-bold text-8xl bg-transparent border-none focus:ring-0 text-on-background p-0 m-0" type="text" value="150"/>
<span class="font-roobert font-bold text-4xl text-primary">g</span>
</div>
<div class="w-32 h-1 bg-primary-container rounded-full mt-2"></div>
</div>
<!-- Quick Amount Chips -->
<div class="flex flex-wrap justify-center gap-3 mt-8">
<button class="bg-surface-container text-on-background font-space-mono text-xs px-6 py-3 rounded-full hover:bg-secondary-fixed-dim transition-colors active:scale-95">50g</button>
<button class="bg-surface-container text-on-background font-space-mono text-xs px-6 py-3 rounded-full hover:bg-secondary-fixed-dim transition-colors active:scale-95">100g</button>

</section>

<span class="font-roobert font-bold text-2xl text-on-surface leading-none">22 <span class="text-xs uppercase font-normal">g</span></span>
</div>
<div class="bg-surface-container-low rounded-lg p-5 flex flex-col border-2 border-secondary-fixed-dim">

<span class="font-roobert font-bold text-2xl text-on-surface leading-none">30 <span class="text-xs uppercase font-normal">g</span></span>

<div class="bg-surface-container-low rounded-lg p-5 flex flex-col border-2 border-secondary-fixed-dim">
